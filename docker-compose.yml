services:
  migrate:
    build: .
    command: ["scripts/migrate.sh"]
    env_file: .env
    volumes:
      - ./data:/app/data
    restart: "no"

  backend:
    build: .
    command: ["scripts/docker_start_backend.sh"]
    env_file: .env
    volumes:
      - ./data:/app/data
      # VPS only, if TASK_COMMAND_CENTER_ENABLED=true:
      # - /opt/task-command-center:/opt/task-command-center:ro
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  bot:
    build: .
    command: ["scripts/docker_start_bot.sh"]
    env_file: .env
    volumes:
      - ./data:/app/data
      # VPS only, if TASK_COMMAND_CENTER_ENABLED=true:
      # - /opt/task-command-center:/opt/task-command-center:ro
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      backend:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  telegram_collector:
    build: .
    command: ["scripts/docker_start_collector.sh"]
    env_file: .env
    environment:
      TELEGRAM_COLLECTOR_HEALTH_HOST: 0.0.0.0
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:8091:8091"
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    profiles: ["collector"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  trend_worker:
    build: .
    command: ["scripts/docker_start_trend_worker.sh"]
    env_file: .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    profiles: ["collector"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      bot:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
