services:
  backend:
    build: .
    command: ["scripts/docker_start_backend.sh"]
    env_file: .env
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  bot:
    build: .
    command: ["scripts/docker_start_bot.sh"]
    env_file: .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  telegram_collector:
    build: .
    command: ["scripts/docker_start_collector.sh"]
    env_file: .env
    environment:
      TELEGRAM_COLLECTOR_HEALTH_HOST: 0.0.0.0
    volumes:
      - ./data:/app/data
    ports:
      - "8091:8091"
    restart: unless-stopped
    profiles: ["collector"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  trend_worker:
    build: .
    command: ["scripts/docker_start_trend_worker.sh"]
    env_file: .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    profiles: ["collector"]
    depends_on:
      - bot
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
