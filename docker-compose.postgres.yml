services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jarhert}
      POSTGRES_USER: ${POSTGRES_USER:-jarhert}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  migrate:
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-jarhert}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-jarhert}
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-jarhert}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-jarhert}
    depends_on:
      postgres:
        condition: service_healthy

  bot:
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-jarhert}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-jarhert}
    depends_on:
      postgres:
        condition: service_healthy

  telegram_collector:
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-jarhert}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-jarhert}
    depends_on:
      postgres:
        condition: service_healthy

  trend_worker:
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-jarhert}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-jarhert}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
