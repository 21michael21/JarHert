model:
  provider: openai-api
  default: gpt-5-nano

agent:
  reasoning_effort: low
  restart_drain_timeout: 60

# Prevent an accidentally large AGENTS.md or project rule file from making
# every Telegram turn slow. The compact SOUL and profile AGENTS fit below this.
context_file_max_chars: 6000

# Telegram is a long-lived personal chat. Keep a recent tail intact, but
# compact earlier than the Codex OAuth default so hundreds of old turns do not
# slow every new message. Compacted rows remain soft-archived in state.db.
compression:
  threshold: 0.5
  protect_last_n: 14
  hygiene_hard_message_limit: 160
  codex_gpt55_autoraise: false

# Telegram is a personal inbox. Keep only the useful final response and a
# single approval prompt: no generated "Working", mid-turn commentary, or
# status breadcrumbs that read like broken duplicate replies on a phone.
#
# Queue a new message while an approval is resolving. In interrupt mode an
# inline confirmation can cancel its own already-approved MCP plan before the
# final receipt reaches Telegram. The queued message is still processed as the
# next turn; it is never discarded.
display:
  busy_input_mode: queue
  busy_ack_enabled: false
  platforms:
    telegram:
      streaming: false
      tool_progress: off
      interim_assistant_messages: false
      long_running_notifications: false
      busy_ack_detail: false
      busy_steer_ack_enabled: false
      cleanup_progress: true
      notifications: important

# Voice messages stay on the VPS: faster-whisper "small" improves Russian
# transcription while remaining within the personal 4 GB VPS profile.
# there and does not use an API key.  Suppress a raw transcript echo so one
# voice note produces one useful response rather than chat noise.
stt:
  enabled: true
  echo_transcripts: false
  provider: local
  local:
    model: small

skills:
  write_approval: true
  guard_agent_created: true
  creation_nudge_interval: 0

curator:
  enabled: true
  consolidate: false
  prune_builtins: false

memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  write_approval: true

cron:
  wrap_response: false

mcp_servers:
  jarhert_native:
    command: "${HERMES_HOME}/.venv/bin/python"
    args:
      - "${HERMES_HOME}/native_tools/mcp_runtime.py"
    env:
      HERMES_HOME: "${HERMES_HOME}"
      PERSONAL_OS_DB: "${HERMES_HOME}/data/personal-os.sqlite3"
      TASK_COMMAND_CENTER_DIR: "${TASK_COMMAND_CENTER_DIR}"
      TASK_COMMAND_CENTER_PYTHON: "${TASK_COMMAND_CENTER_PYTHON}"
      TASK_COMMAND_CENTER_HEALTH_CACHE_SECONDS: "${TASK_COMMAND_CENTER_HEALTH_CACHE_SECONDS}"
      HERMES_OWNER_TELEGRAM_CHAT_ID: "${HERMES_OWNER_TELEGRAM_CHAT_ID}"
      HERMES_NATIVE_SEND_COMMAND: "${HERMES_NATIVE_SEND_COMMAND}"
      HERMES_TOOL_SURFACE: "${HERMES_TOOL_SURFACE}"
      HERMES_TOOL_BUNDLES: "${HERMES_TOOL_BUNDLES}"
      TELEGRAM_API_ID: "${TELEGRAM_API_ID}"
      TELEGRAM_API_HASH: "${TELEGRAM_API_HASH}"
      TELEGRAM_USER_SESSION: "${TELEGRAM_USER_SESSION}"
    enabled: true
    timeout: 120
    connect_timeout: 30
    supports_parallel_tool_calls: false
    tools:
      include:
        - integration_health
        - system_status
        - tool_catalog_discover
        - tool_catalog_invoke
        - task_list
        - calendar_list
        - action_plan_confirm_execute
        - action_plan_dag_confirm_execute
        - action_plan_status
        - action_plan_trace
        - action_plan_pause_confirmed
        - action_plan_resume_confirmed
        - contact_add
        - contact_list
        - message_plan_confirm_schedule
        - message_plan_cancel_confirmed
        - monitor_add_github_releases
        - monitor_add_source
        - monitor_list
        - monitor_digest
        - monitor_digest_mark_delivered
        - monitor_disable
        - knowledge_archive_url_confirmed
        - knowledge_archive_urls_confirmed
        - knowledge_search
        - knowledge_source_excerpt
        - knowledge_list_sources
        - github_public_repository
        - shopping_add
        - shopping_list
        - shopping_mark_bought
        - shopping_remove
        - trip_create
        - trip_list
        - trip_details
        - trip_add_item
        - trip_item_complete
        - trip_cancel_confirmed
        - skill_feedback
        - skill_candidates
        - skill_mark_staged
        - memory_block_upsert
        - memory_block_list
        - memory_context
        - note_search
        - note_edit
        - note_history
        - note_delete_confirmed
        - memory_consolidation_list
        - project_context_upsert
        - project_context_list
        - project_context_resolve
        - commitment_list
        - commitment_complete_confirmed
        - reminder_create
        - reminder_list
        - reminder_reschedule
        - reminder_cancel
        - crm_interaction_log
        - crm_timeline
        - personal_today
        - personal_daily_brief
        - personal_weekly_review
        - subscription_create
        - subscription_list
        - subscription_update
        - subscription_cancel
        - work_mode_get
        - work_mode_set
        - voice_inbox_prepare
        - voice_vocabulary_add
        - voice_vocabulary_list
        - coding_job_enqueue_confirmed
        - coding_job_list
        - telegram_text_export_confirmed
        - telegram_file_download_confirmed
        - telegram_text_export_excerpt
        - telegram_text_export_queue_analysis_confirmed
      resources: false
      prompts: false

  # Optional official GitHub MCP Server. It stays disabled until the owner has
  # installed the binary and added a fine-grained read-only token to .env.
  github_readonly:
    command: "${HERMES_HOME}/bin/github-mcp-server"
    args:
      - stdio
      - --read-only
      - --lockdown-mode
      - --toolsets
      - repos,issues,pull_requests,actions,users,code_security
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_PERSONAL_ACCESS_TOKEN}"
    enabled: false
    timeout: 90
    connect_timeout: 20
    supports_parallel_tool_calls: false
    tools:
      resources: false
      prompts: false

terminal:
  docker_image: "nikolaik/python-nodejs:python3.11-nodejs20"
  docker_forward_env: []
  docker_network: true
  container_cpu: 1
  container_memory: 2048
  container_disk: 4096
  container_persistent: false
  timeout: 900
