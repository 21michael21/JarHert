model:
  provider: openrouter
  default: openrouter/free

skills:
  write_approval: true
  guard_agent_created: true
  creation_nudge_interval: 0

curator:
  enabled: true
  consolidate: false
  prune_builtins: false

memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  write_approval: true

cron:
  wrap_response: false
