name: jarhert
version: 0.2.0
description: "Личный русскоязычный Hermes: память, проекты, планирование и безопасная автоматизация"
hermes_requires: ">=0.18.2"
author: "21michael21"

env_requires:
  - name: TELEGRAM_BOT_TOKEN
    description: "Токен Telegram-бота для единственного Hermes gateway"
    required: true
  - name: TELEGRAM_ALLOWED_USERS
    description: "Разрешённые Telegram user ID через запятую"
    required: true
  - name: JARHERT_DASHBOARD_SESSION_SECRET
    description: "Random secret for signed Telegram Mini App sessions; never commit it"
    required: false
    default: ""
  - name: JARHERT_DASHBOARD_ALLOWED_TG_USER_IDS
    description: "Optional stricter Telegram user allowlist for the personal Mini App"
    required: false
    default: ""
  - name: OPENROUTER_API_KEY
    description: "OpenRouter, если используется free/cheap provider"
    required: false
    default: ""
  - name: OPENAI_API_KEY
    description: "OpenAI, если используется стабильный cheap provider"
    required: false
    default: ""
  - name: HERMES_RESEARCH_ALLOWED_HOSTS
    description: "Comma-separated HTTPS hosts allowed as declared research sources"
    required: false
    default: "github.com,api.github.com"
  - name: TASK_COMMAND_CENTER_DIR
    description: "External Task Command Center directory on this host"
    required: true
  - name: TASK_COMMAND_CENTER_PYTHON
    description: "Python executable relative to Task Command Center"
    required: false
    default: ".venv/bin/python"
  - name: TELEGRAM_API_ID
    description: "Telegram MTProto application ID for owner-authorized exports"
    required: false
    default: ""
  - name: TELEGRAM_API_HASH
    description: "Telegram MTProto application hash for owner-authorized exports"
    required: false
    default: ""
  - name: TELEGRAM_USER_SESSION
    description: "Path to the owner-authorized Telethon session"
    required: false
    default: ""

distribution_owned:
  - SOUL.md
  - AGENTS.md
  - config.yaml
  - skills/
  - native_tools/
  - scripts/
  - requirements-native.txt
